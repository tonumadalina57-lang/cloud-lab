apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloud-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: cloud-app

  template:
    metadata:
      labels:
        app: cloud-app

    spec:
      containers:
      - name: cloud-app
        image: cloud-app
        imagePullPolicy: Never

        ports:
        - containerPort: 5000